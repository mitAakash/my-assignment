name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Setup Node.js (for lint/test)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # Step 3a: Lint & Test Frontend
      - name: Lint & Test Frontend
        run: |
          cd Task-/Mern-Frontend
          npm install
          npm run lint || true
          npm test || true

      # Step 3b: Lint & Test Backend
      - name: Lint & Test Backend
        run: |
          cd Task-/Mern-backend
          npm install
          npm run lint || true
          npm test || true

      # Step 4: Docker Login
      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 5: Build & Push Docker Images
      - name: Build & Push Docker Images
        run: |
          docker build -t mitaakash/mern-frontend:latest Task-/Mern-Frontend
          docker build -t mitaakash/mern-backend:latest Task-/Mern-backend
          docker build -t mitaakash/lamp-app:latest Task-/PhP-Lamp

          docker push mitaakash/mern-frontend:latest
          docker push mitaakash/mern-backend:latest
          docker push mitaakash/lamp-app:latest

      # Step 6: Deploy to Staging
      - name: Deploy to Staging
        run: |
          ssh -o StrictHostKeyChecking=no user@staging-server 'cd /path/to/Task- && ./setup.sh'